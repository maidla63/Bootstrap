<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <title>Registreerimine</title>

  
    <link rel="stylesheet"
          href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="bg-white p-4">

        <h2 class="mb-4">Registreerimine psühiaastri haiglasse</h2>

        <form>

            <div class="form-row">
                <div class="form-group col-md-6">
                    <label for="eesnimi">Eesnimi</label>
                    <input type="text" class="form-control"
                           id="eesnimi" placeholder="eesnimi" required>
                </div>

                <div class="form-group col-md-6">
                    <label for="perenimi">Perenimi</label>
                    <input type="text" class="form-control"
                           id="perenimi" placeholder="perenimi" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group col-md-6">
                    <label for="email">Email</label>
                    <input type="email" class="form-control"
                           id="email" placeholder="jteller@hkhk.edu.ee" required>
                </div>

                <div class="form-group col-md-6">
                    <label for="telefon">Telefon</label>
                    <input type="tel" class="form-control"
                           id="telefon" placeholder="5555 6666" required>
                </div>
            </div>
            <div class="form-group">
                <label for="kirjeldus">Kirjeldus</label>
                <textarea class="form-control"
                          id="kirjeldus"
                          placeholder="Kirjelda ennast, enda mure ning kõike mida me teada tahaks"
                          rows="4" required></textarea>
            </div>

            <div class="form-group form-check">
                <input type="checkbox" class="form-check-input"
                       id="tingimused" required>
                <label class="form-check-label" for="tingimused">
                    Olen tutvunud ja nõus
                    <a href="#">võimalike kõrvalnähtudga, haiguste ning mentaalsete probleemidega</a>
                </label>
            </div>

            <button type="submit" class="btn btn-primary">
                Registreeru vastuvõtule
            </button>

        </form>

    </div>
</div>

</body>
</html>
